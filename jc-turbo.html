// ============================================================
// GAME STATE
// ============================================================
const BROTHER_UNLOCK=5,PENALTY_SECS=20,QUESTIONS_PER_LEVEL=5;
var currentLang='es',currentCat='places',currentLevel=1,currentPhrases=[],startTime,timerInterval;
const levelList=document.getElementById('level-list'),gameContainer=document.getElementById('game'),questionsContainer=document.getElementById('questions'),resultsContainer=document.getElementById('results');
const LANG_SUBTITLES={es:'Junior Cert Spanish · Written Production · Q17 & Q18',fr:'Junior Cert French · Written Production · Q17 & Q18',de:'Junior Cert German · Written Production · Q17 & Q18'};
const VOICE_LANGS={es:'es-ES',fr:'fr-FR',de:'de-DE'};
const ACCENT_TIPS={es:'For 3 stars: include accents (a e i o u n) exactly as shown.',fr:'For 3 stars: include accents (e e e a a u u i c) exactly as shown.',de:'For 3 stars: include umlauts (a o u ss) exactly as shown.'};

function storageKey(s){return 'jc_turbo_'+currentLang+'_'+s;}
function getUnlocked(){return parseInt(localStorage.getItem(storageKey('unlocked'))||'1');}
function setUnlocked(l){if(l>getUnlocked())localStorage.setItem(storageKey('unlocked'),l);}
function getBest(c,l){return localStorage.getItem(storageKey('best_'+c+'_'+l));}
function setBest(c,l,s){const p=parseInt(getBest(c,l)||'0');if(s>p)localStorage.setItem(storageKey('best_'+c+'_'+l),s);}
function getTotalStars(){let t=0;['places','people','food','freetime','opinions'].forEach(function(c){for(var v=1;v<=10;v++)t+=parseInt(getBest(c,v)||'0');});return t;}
function brotherUnlocked(){return getTotalStars()>=BROTHER_UNLOCK;}
function getTurboData(){const cats=['places','people','food','freetime','opinions'],labels={places:'Places',people:'People',food:'Food & Routine',freetime:'Free Time',opinions:'Opinions'},data={};cats.forEach(function(c){data[c]={label:labels[c],levels:{}};for(var l=1;l<=10;l++){const s=getBest(c,l);if(s)data[c].levels[l]=parseInt(s);}});return data;}

function selectLang(lang,btn){currentLang=lang;document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');document.getElementById('subtitle').textContent=LANG_SUBTITLES[lang];localStorage.setItem('jc_turbo_last_lang',lang);renderLevels();}
function selectCat(cat,btn){currentCat=cat;document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderLevels();}

function renderLevels(){
  levelList.style.display='flex';gameContainer.style.display='none';levelList.innerHTML='';updateProgress();
  var unlocked=getUnlocked();
  var zones={1:{label:'Levels 1-4 · Core Present Tense'},5:{label:'Levels 5-7 · Past Tense & Opinions'},8:{label:'Levels 8-10 · Range & Complex Sentences'}};
  for(var i=1;i<=10;i++){
    if(zones[i]){var zl=document.createElement('div');zl.className='zone-label';zl.textContent=zones[i].label;levelList.appendChild(zl);}
    var btn=document.createElement('button'),best=getBest(currentCat,i),locked=i>unlocked,stars=best?'⭐'.repeat(parseInt(best))+'☆'.repeat(3-parseInt(best)):'',zc=i>=8?'adv-zone':'';
    btn.className='level-btn'+(zc?' '+zc:'');btn.type='button';
    btn.innerHTML='<span>'+(locked?'🔒 ':'')+'Level '+i+'</span><span class="level-badge">'+(stars||(locked?'':'—'))+'</span>';
    btn.disabled=locked;
    (function(lv){btn.addEventListener('click',function(){startGame(lv);});})(i);
    levelList.appendChild(btn);
  }
  if(brotherUnlocked()){
    var bb=document.createElement('button');bb.type='button';
    bb.textContent='🧓 Meet The Brother →';bb.className='level-btn brother-btn';
    bb.addEventListener('click',function(){localStorage.setItem('jc_turbo_data',JSON.stringify(getTurboData()));localStorage.setItem('jc_turbo_lang',currentLang);window.location.href='jc-brother.html';});
    levelList.appendChild(bb);
  }
}

function updateProgress(){
  var stars=getTotalStars(),pct=Math.min(100,Math.round((stars/BROTHER_UNLOCK)*100));
  document.getElementById('progress-fill').style.width=pct+'%';document.getElementById('progress-pct').textContent=pct+'%';
  var banner=document.getElementById('star-banner');
  if(brotherUnlocked()){banner.textContent='🎉 '+stars+' stars — The Brother is unlocked!';banner.style.background='#e8f5ee';banner.style.borderColor='#2d5a27';banner.style.color='#1a5c38';}
  else{banner.textContent='⭐ '+stars+' star'+(stars!==1?'s':'')+' earned — need '+BROTHER_UNLOCK+' to unlock The Brother';}
}

function startGame(level){
  currentLevel=level;
  var pool=PHRASES[currentLang][currentCat].filter(function(p){return p.lv===level;});
  var adj=PHRASES[currentLang][currentCat].filter(function(p){return Math.abs(p.lv-level)===1;});
  currentPhrases=shuffleArray(shuffleArray(pool.slice()).concat(shuffleArray(adj.slice()))).slice(0,QUESTIONS_PER_LEVEL);
  levelList.style.display='none';gameContainer.style.display='block';questionsContainer.innerHTML='';resultsContainer.innerHTML='';
  var placeholder={es:'Escribe en español...',fr:'Écris en français...',de:'Schreib auf Deutsch...'}[currentLang]||'Write here...';
  currentPhrases.forEach(function(phrase,idx){
    var safe=phrase.en.replace(/'/g,"\\'").replace(/"/g,'&quot;'),ansSafe=phrase.tl.replace(/"/g,'&quot;');
    var div=document.createElement('div');
    div.innerHTML='<div class="prompt-row"><strong>'+phrase.en+'</strong><button class="speak-prompt" type="button" onclick="speakPrompt(\''+safe+'\')" title="Read aloud">🔊</button></div>'+
      '<input type="text" data-answer="'+ansSafe+'" placeholder="'+placeholder+'" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">'+
      '<button class="voice-btn-inline" type="button" onclick="startVoice(this,'+idx+')">🎤 Speak</button>';
    var inp=div.querySelector('input');
    inp.addEventListener('paste',function(e){e.preventDefault();});inp.addEventListener('drop',function(e){e.preventDefault();});
    questionsContainer.appendChild(div);
  });
  startTimer();
}

function shuffleArray(a){return a.sort(function(){return Math.random()-0.5;});}
function startTimer(){startTime=Date.now();timerInterval=setInterval(function(){document.getElementById('timer').textContent='Time: '+Math.floor((Date.now()-startTime)/1000)+'s';},1000);}
function stopTimer(){clearInterval(timerInterval);}

// ============================================================
// SUBMIT — bulletproof: results array collected BEFORE
// any innerHTML change, so DOM wipe can never corrupt results
// ============================================================
document.getElementById('submit').addEventListener('click',function(){
  stopTimer();
  var elapsed=Math.floor((Date.now()-startTime)/1000),penalty=0,correct=0,total=currentPhrases.length,strictCorrect=0,lenientCorrect=0;

  // Step 1: collect ALL results into array first
  var results=[];
  document.querySelectorAll('#questions input').forEach(function(input){
    var userAns=input.value.trim(),correctAns=input.dataset.answer;
    var strict=normaliseStrict(userAns)===normaliseStrict(correctAns);
    var lenient=normaliseLenient(userAns)===normaliseLenient(correctAns);
    results.push({userAns:userAns,correctAns:correctAns,strict:strict,lenient:lenient,engLabel:input.closest('div').querySelector('strong').textContent});
    if(lenient)lenientCorrect++;if(strict)strictCorrect++;
  });

  // Step 2: colour borders while inputs still in DOM
  document.querySelectorAll('#questions input').forEach(function(input,idx){
    if(results[idx].lenient){correct++;input.style.border='2px solid #27ae60';input.style.background='#f0fff4';}
    else{penalty+=PENALTY_SECS;input.style.border='2px solid #e74c3c';input.style.background='#fff5f5';}
  });

  var totalTime=elapsed+penalty,stars=0;
  if(strictCorrect===total&&totalTime<=levelUnlockTime(currentLevel))stars=3;
  else if(lenientCorrect===total)stars=2;
  else if(lenientCorrect>=Math.ceil(total*0.5))stars=1;
  setBest(currentCat,currentLevel,stars);if(stars>=1)setUnlocked(currentLevel+1);

  // Step 3: render all results from array — never touch inputs again
  resultsContainer.innerHTML='';
  if(correct===total){var cel=document.createElement('div');cel.className='perfect-celebration';cel.textContent=stars===3?'🎉 PERFECT — 3 stars! 🎉':'✅ All correct!';resultsContainer.appendChild(cel);if(stars===3)setTimeout(function(){cel.textContent='';},5000);}
  var sum=document.createElement('div');sum.innerHTML='<h3>Finished!</h3><p>Correct: '+correct+'/'+total+'</p><p>Time: '+elapsed+'s + Penalty: '+penalty+'s = <strong>'+totalTime+'s</strong></p><p style="font-size:1.4rem">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</p>';resultsContainer.appendChild(sum);
  if(stars<3&&strictCorrect<total&&lenientCorrect===total){var an=document.createElement('p');an.style.cssText='font-size:0.82rem;color:#b45309;margin:4px 0 8px;';an.textContent='💡 '+(ACCENT_TIPS[currentLang]||ACCENT_TIPS.es);resultsContainer.appendChild(an);}
  var missed=results.filter(function(r){return !r.lenient;});
  if(missed.length){var mt=document.createElement('h4');mt.textContent='What you missed:';resultsContainer.appendChild(mt);missed.forEach(function(r){var p=document.createElement('p');p.style.cssText='margin:6px 0;font-size:0.92rem;';p.innerHTML='<strong>'+r.engLabel+'</strong><br>✅ <span style="color:#27ae60">'+r.correctAns+'</span><br>❌ <span style="color:#e74c3c">'+(r.userAns||'(blank)')+'</span>';resultsContainer.appendChild(p);});}
  if(stars>=1){var um=document.createElement('p');um.className='unlock-msg';um.textContent='🔓 Level '+(currentLevel+1)+' unlocked!';resultsContainer.appendChild(um);}
  updateProgress();
  if(brotherUnlocked()){var bm=document.createElement('p');bm.className='unlock-msg';bm.innerHTML='🧓 The Brother is ready! <a href="jc-brother.html" style="color:#1a5c38;font-weight:bold;" onclick="saveTurboData()">Meet The Brother →</a>';resultsContainer.appendChild(bm);}
  var tb=document.createElement('button');tb.textContent='Try Again';tb.className='try-again';tb.type='button';tb.onclick=function(){startGame(currentLevel);};resultsContainer.appendChild(tb);
  var bb=document.createElement('button');bb.textContent='← Back to Levels';bb.id='back-button';bb.type='button';bb.onclick=function(){renderLevels();};resultsContainer.appendChild(bb);
});

function saveTurboData(){localStorage.setItem('jc_turbo_data',JSON.stringify(getTurboData()));localStorage.setItem('jc_turbo_lang',currentLang);}
function levelUnlockTime(l){return 130-(l-1)*8;}

// Bulletproof normalisers — handles all ES/FR/DE edge cases
function normaliseLenient(s){
  return String(s).toLowerCase()
    .replace(/\u2026/g,'').replace(/\.\.\./g,'').replace(/[¿¡]/g,'')
    .replace(/[,;:.]/g,'').replace(/[\u201c\u201d\u2018\u2019\u00ab\u00bb]/g,'')
    .replace(/[\u2014\u2013-]/g,' ')
    .replace(/[àáâäã]/g,'a').replace(/[èéêë]/g,'e').replace(/[ìíîï]/g,'i')
    .replace(/[òóôöõ]/g,'o').replace(/[ùúûü]/g,'u').replace(/[ýÿ]/g,'y')
    .replace(/[ñ]/g,'n').replace(/[ç]/g,'c').replace(/[ß]/g,'ss')
    .replace(/[œ]/g,'oe').replace(/[æ]/g,'ae')
    .replace(/\s+/g,' ').trim();
}
function normaliseStrict(s){
  return String(s).toLowerCase()
    .replace(/\u2026/g,'').replace(/\.\.\./g,'').replace(/[¿¡]/g,'')
    .replace(/[,;:.]/g,'').replace(/[\u201c\u201d\u2018\u2019\u00ab\u00bb]/g,'')
    .replace(/[\u2014\u2013]/g,' ')
    .replace(/\s+/g,' ').trim();
}

function speakPrompt(t){if(!('speechSynthesis' in window))return;var u=new SpeechSynthesisUtterance(t);u.lang='en-IE';u.rate=0.9;window.speechSynthesis.speak(u);}
var activeRec=null;
function startVoice(btn,idx){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Voice input works best in Chrome.');return;}
  if(activeRec)activeRec.stop();
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR();
  rec.lang=VOICE_LANGS[currentLang]||'es-ES';rec.continuous=false;rec.interimResults=false;activeRec=rec;
  btn.classList.add('listening');btn.textContent='🔴 Listening...';
  rec.onresult=function(e){var inp=document.querySelectorAll('#questions input');if(inp[idx])inp[idx].value=e.results[0][0].transcript;};
  rec.onend=function(){btn.classList.remove('listening');btn.textContent='🎤 Speak';activeRec=null;};
  rec.onerror=function(){btn.classList.remove('listening');btn.textContent='🎤 Speak';activeRec=null;};
  rec.start();
}

(function(){
  var saved=localStorage.getItem('jc_turbo_last_lang');
  if(saved&&PHRASES[saved]){currentLang=saved;document.querySelectorAll('.lang-btn').forEach(function(b){var m=(saved==='es'&&b.textContent.includes('Spanish'))||(saved==='fr'&&b.textContent.includes('French'))||(saved==='de'&&b.textContent.includes('German'));b.classList.toggle('active',m);});document.getElementById('subtitle').textContent=LANG_SUBTITLES[saved];}
  renderLevels();
})();
</script>
